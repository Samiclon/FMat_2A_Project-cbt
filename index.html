const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
const fmt=s=>`${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;
const gradeOf=s=>s>=16?"A":s>=14?"B":s>=12?"C":s>=8?"D":"F";
const gc=g=>({A:"#16a34a",B:"#2563eb",C:"#d97706",D:"#ea580c",F:"#dc2626"})[g]||"#666";
const pickQs=()=>{
  const by={};QB.forEach(q=>{if(!by[q.topic])by[q.topic]=[];by[q.topic].push(q);});
  const sel=[];
  Object.entries(QUOTA).forEach(([t,n])=>shuffle(by[t]||[]).slice(0,n).forEach(q=>sel.push({...q,sOpts:shuffle(q.opts)})));
  return shuffle(sel);
};
const safeSid=sid=>sid.replace(/[^A-Z0-9]/g,"_");

/* ══════════════════════════════════════════════════════════
   FIREBASE STORAGE  (replaces window.storage / localStorage)
   All data lives in Firebase Realtime Database under FB_BASE/
══════════════════════════════════════════════════════════ */
const fbGet=async path=>{
  try{const snap=await db.ref(`${FB_BASE}/${path}`).once("value");return snap.val();}catch{return null;}
};
const fbSet=async(path,value)=>{
  try{await db.ref(`${FB_BASE}/${path}`).set(value);}catch{}
};
const fbDel=async path=>{
  try{await db.ref(`${FB_BASE}/${path}`).remove();}catch{}
};

};

/* ── ID generation ────────────────────────────────────── */
const ID_CHARS="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
const genId=()=>{let id="";for(let i=0;i<6;i++)id+=ID_CHARS[Math.floor(Math.random()*ID_CHARS.length)];return id;};
const genUniqueId=used=>{let id,t=0;do{id=genId();t++;}while(used.has(id)&&t<9999);return id;};

   CSV EXPORT
══════════════════════════════════════════════════════════ */
const exportCSV=scores=>{
  const hdr=["Name","Student ID","Score","Total","Percentage","Grade","Violations","Penalty","Time Taken","Date"];
  const rows=scores.map(s=>[`"${s.name}"`,s.sid,s.finalScore,s.total,s.pct+"%",s.grade,s.violations,s.penalty>0?`-${s.penalty}`:"0",`${Math.floor((s.timeTaken||0)/60)}m ${(s.timeTaken||0)%60}s`,`"${s.date}"`].join(","));
  const csv=[hdr.join(","),...rows].join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download=`SS2A_Results_${new Date().toLocaleDateString("en-NG").replace(/\//g,"-")}.csv`;
  a.click();
};

function ResultCard({result,onBack}){
  const gcol=gc(result.grade);
  const emoji=result.grade==="A"?"🏆":result.grade==="B"?"🥈":result.grade==="C"?"🥉":"📊";
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${NAV},#0e1c3a)`,padding:"22px",fontFamily:FF,userSelect:"none"}}>
      <div style={{maxWidth:"560px",margin:"0 auto"}}>
        {onBack&&<button onClick={onBack} style={{marginBottom:"14px",padding:"7px 16px",background:"rgba(255,255,255,0.12)",color:"#fff",border:"1px solid rgba(255,255,255,0.2)",borderRadius:"8px",fontSize:"12px",cursor:"pointer"}}>← Back</button>}
        <div style={{textAlign:"center",color:"#fff",marginBottom:"16px"}}>
          <div style={{fontSize:"52px",marginBottom:"6px"}}>{emoji}</div>
          <h1 style={{margin:"0 0 3px",fontSize:"21px",fontWeight:"800"}}>
            {onBack?"Your Result":"Exam Completed!"}
          </h1>
          <p style={{margin:0,fontSize:"11px",opacity:0.6}}>{result.name} • {result.sid}</p>
        </div>
        <div style={{...card,padding:"26px",marginBottom:"13px",textAlign:"center"}}>
          <div style={{fontSize:"56px",fontWeight:"900",color:gcol,lineHeight:1}}>
            {result.finalScore.toFixed(1)}<span style={{fontSize:"22px",color:"#ccc"}}>/{result.total}</span>
          </div>
          <div style={{fontSize:"25px",fontWeight:"800",color:gcol,margin:"4px 0 10px"}}>{result.pct}%</div>
          <div style={{display:"inline-block",background:gcol,color:"#fff",padding:"5px 18px",borderRadius:"20px",fontSize:"17px",fontWeight:"800",marginBottom:"16px"}}>
            Grade {result.grade}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"9px",marginBottom:"12px"}}>
            {[["✅ Correct",result.rawScore],["❌ Wrong",result.total-result.rawScore],["⚠️ Violations",result.violations]].map(([l,v])=>(
              <div key={l} style={{background:"#f8fafc",borderRadius:"9px",padding:"10px"}}>
                <div style={{fontSize:"19px",fontWeight:"800",color:NAV}}>{v}</div>
                <div style={{fontSize:"9.5px",color:"#777",marginTop:"2px"}}>{l}</div>
              </div>
            ))}
          </div>
          {result.penalty>0&&<p style={{margin:"0 0 4px",fontSize:"12px",color:"#ef4444"}}>Penalty: −{result.penalty} mark(s) for {result.violations} violation(s)</p>}
          <p style={{margin:"6px 0 0",fontSize:"11px",color:"#aaa"}}>
            Time: {Math.floor((result.timeTaken||0)/60)}m {(result.timeTaken||0)%60}s • {result.date}
          </p>
          {result.autoMsg&&<p style={{margin:"5px 0 0",fontSize:"11px",color:"#f97316"}}>ℹ️ {result.autoMsg}</p>}
        </div>
        {result.topicMap&&Object.keys(result.topicMap).length>0&&(
          <div style={{...card,padding:"20px",marginBottom:"13px"}}>
            <h3 style={{margin:"0 0 14px",fontSize:"14px",fontWeight:"700",color:NAV}}>📊 Performance by Topic</h3>
            {Object.entries(result.topicMap).map(([t,{right,total:tot}])=>{
              const pct=tot>0?Math.round(right/tot*100):0;
              return(
                <div key={t} style={{marginBottom:"11px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                    <span style={{fontSize:"12px",color:"#374151",fontWeight:"600"}}>{t}</span>
                    <span style={{fontSize:"12px",color:"#888",fontWeight:"600"}}>{right}/{tot} ({pct}%)</span>
                  </div>
                  <div style={{height:"8px",background:"#f1f5f9",borderRadius:"4px",overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:pct>=70?"#22c55e":pct>=50?"#f59e0b":"#ef4444",borderRadius:"4px"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <div style={{background:"rgba(255,255,255,0.07)",borderRadius:"12px",padding:"16px",textAlign:"center",color:"rgba(255,255,255,0.65)",fontSize:"12px",lineHeight:"1.75"}}>
          📋 Your score is saved and accessible to your teacher.<br/>A resit requires your teacher's permission.
        </div>
      </div>
    </div>
  );
}

  const mergedReg=React.useMemo(()=>{
    const m={...REGISTRY};

  const handleSidChange=e=>{

  /* ── SUBMIT ───────────────────────────────────────────── */
  const submit=useCallback(async(forced=false,autoMsg="")=>{
    if(subRef.current)return;subRef.current=true;clearInterval(tmr.current);
    const qs=qRef.current,ans=aRef.current,tl=tlRef.current,v=vRef.current,st=stRef.current,tok=sessRef.current;
    const topicMap={};let correct=0;
    qs.forEach(q=>{if(!topicMap[q.topic])topicMap[q.topic]={right:0,total:0};topicMap[q.topic].total++;if(ans[q.id]===q.ans){correct++;topicMap[q.topic].right++;}});
    const penalty=+(v*PENALTY_PT).toFixed(1);
    const finalScore=+Math.max(0,correct-penalty).toFixed(1);
    const data={name:st.name,sid:st.sid,rawScore:correct,finalScore,total:qs.length,
      pct:+((finalScore/qs.length)*100).toFixed(1),grade:gradeOf(finalScore),
      violations:v,penalty,timeTaken:DURATION_S-tl,
      date:new Date().toLocaleString("en-NG"),topicMap,forced,autoMsg,sessionTok:tok};
    await saveScore(data);await clearSession(st.sid);
    setResult(data);setScreen("result");setCSub(false);
  },[]);

  /* ── Timer ────────────────────────────────────────────── */
  useEffect(()=>{
    if(screen!=="exam")return;
    tmr.current=setInterval(()=>{setTL(t=>{const n=t-1;tlRef.current=n;if(n<=0){clearInterval(tmr.current);submit(true,"Time expired — auto-submitted");return 0;}return n;});},1000);
    return()=>clearInterval(tmr.current);
  },[screen,submit]);

  /* ── Anti-cheat ───────────────────────────────────────── */
  useEffect(()=>{
    if(screen!=="exam")return;
    const flag=reason=>{const nv=vRef.current+1;vRef.current=nv;setViol(nv);if(nv>=MAX_VIOL){setViolMsg("");submit(true,`Auto-submitted: ${MAX_VIOL} violations`);}else setViolMsg(`VIOLATION ${nv}/${MAX_VIOL}: ${reason}. Penalty −${PENALTY_PT} mark. ${MAX_VIOL-nv} warning(s) left.`);};
    const onVis=()=>{if(document.hidden)flag("Tab/window switch detected");};
    const onBlur=()=>flag("Browser window lost focus");
    const noCtx=e=>e.preventDefault();
    const onKey=e=>{if((e.ctrlKey||e.metaKey)&&"cvaus".includes(e.key.toLowerCase()))e.preventDefault();if(["F12","F5"].includes(e.key))e.preventDefault();};
    document.addEventListener("visibilitychange",onVis);window.addEventListener("blur",onBlur);
    document.addEventListener("contextmenu",noCtx);document.addEventListener("keydown",onKey);
    document.addEventListener("copy",noCtx);document.addEventListener("paste",noCtx);
    return()=>{document.removeEventListener("visibilitychange",onVis);window.removeEventListener("blur",onBlur);document.removeEventListener("contextmenu",noCtx);document.removeEventListener("keydown",onKey);document.removeEventListener("copy",noCtx);document.removeEventListener("paste",noCtx);};
  },[screen,submit]);

  /* ── Save on close ────────────────────────────────────── */
  useEffect(()=>{
    if(screen!=="exam")return;
    const fn=()=>{if(subRef.current)return;const qs=qRef.current,ans=aRef.current,v=vRef.current,tl=tlRef.current,st=stRef.current;let c=0;qs.forEach(q=>{if(ans[q.id]===q.ans)c++;});const fs=+Math.max(0,c-v*PENALTY_PT).toFixed(1);saveScore({name:st.name,sid:st.sid,rawScore:c,finalScore:fs,total:qs.length,pct:+((fs/qs.length)*100).toFixed(1),grade:gradeOf(fs),violations:v,penalty:+(v*PENALTY_PT).toFixed(1),timeTaken:DURATION_S-tl,date:new Date().toLocaleString("en-NG"),topicMap:{},forced:true,autoMsg:"Browser closed during exam"});clearSession(st.sid);};
    window.addEventListener("beforeunload",fn);return()=>window.removeEventListener("beforeunload",fn);
  },[screen]);

  /* ── LOGIN ────────────────────────────────────────────── */
  const handleLogin=async()=>{
    setErr("");
    if(lAdmin.trim()){
      if(lAdmin.trim()!==ADMIN_CODE){setErr("Invalid admin code.");return;}
      setLoading(true);
      const[scores,dr]=await Promise.all([getAllScores(),getDynRegistry()]);

    setLoading(true);
    const existing=await getScore(sid);
    if(existing){const ok=await checkRetake(sid);if(!ok){setLoading(false);setErr(`"${sid}" has already completed this exam. Contact your teacher for a resit.`);return;}await clearRetake(sid);}
    const activeSess=await getSession(sid);
    if(activeSess){const age=(Date.now()-activeSess.ts)/1000;if(age<DURATION_S+300){setLoading(false);setErr(`"${sid}" already has an active session on another device. Ask your teacher to reset it.`);return;}}
    const token=Math.random().toString(36).slice(2)+Date.now();
    await setSession(sid,token);setSessTok(token);sessRef.current=token;
    setLoading(false);
    const qs=pickQs();qRef.current=qs;stRef.current={name:regName,sid};
    aRef.current={};tlRef.current=DURATION_S;vRef.current=0;subRef.current=false;
    setStudent({name:regName,sid});setQs(qs);setAnswers({});setTL(DURATION_S);setViol(0);setCurrent(0);setScreen("instructions");
  };

  /* ── RESULT LOOKUP ────────────────────────────────────── */
  const handleLookup=async()=>{
    setLookErr("");setLookRes(null);
    const sid=lookSid.trim().toUpperCase();
    if(!sid){setLookErr("Please enter your Student ID.");return;}
    if(!ID_REGEX.test(sid)){setLookErr("Invalid format. Use 6 uppercase letters/numbers.");return;}
    setLookLd(true);
    const score=await getScore(sid);
    setLookLd(false);
    if(!score){setLookErr("No result found for this ID. You may not have submitted the exam yet.");return;}
    setLookRes(score);
  };

  /* ── GRANT RETAKE ─────────────────────────────────────── */
  const handleGrant=async()=>{
    const s=gSid.trim().toUpperCase();if(!s)return;
    if(!ID_REGEX.test(s)){setGMsg("⚠️ Invalid ID format.");return;}
    if(!mergedReg[s]){setGMsg(`⚠️ "${s}" is not in the registry.`);return;}
    await grantRetake(s);await clearSession(s);
    setGMsg(`✅ Resit granted for ${s} (${mergedReg[s]}). Session reset.`);
    setGSid("");setAll(await getAllScores());
  };

  const handleResetSession=async sid=>{await clearSession(sid);setGMsg(`✅ Session reset for ${sid}.`);setAll(await getAllScores());};

  /* ── ADD STUDENT ──────────────────────────────────────── */
  const handleAddStudent=async()=>{
    const name=newName.trim();
    if(!name){setRegMsg({txt:"⚠️ Please enter the student's full name.",ok:false});return;}
    const usedIds=new Set([...Object.keys(REGISTRY),...Object.keys(dynReg)]);
    let sid=newId.trim().toUpperCase();
    if(sid){if(!ID_REGEX.test(sid)){setRegMsg({txt:"⚠️ ID must be exactly 6 letters/numbers.",ok:false});return;}if(usedIds.has(sid)){setRegMsg({txt:`⚠️ ID "${sid}" is already in use.`,ok:false});return;}}
    else sid=genUniqueId(usedIds);
    await addStudent(sid,name);
    const updated=await getDynRegistry();setDynReg(updated);
    setNewName("");setNewId("");setRegMsg({txt:`✅ ${name} added — ID: ${sid}`,ok:true});
  };

  /* ── REMOVE STUDENT ───────────────────────────────────── */
  const handleRemoveStudent=sid=>{
    if(REGISTRY[sid]){setRegMsg({txt:"⚠️ Base registry students can only be removed by editing the HTML file.",ok:false});return;}
    setConfirmRemove({sid,name:dynReg[sid]?.name||sid});
  };
  const confirmRemoveStudent=async()=>{
    if(!confirmRemove)return;
    await removeStudent(confirmRemove.sid);
    const updated=await getDynRegistry();setDynReg(updated);
    setRegMsg({txt:`✅ ${confirmRemove.sid} removed.`,ok:true});setConfirmRemove(null);
  };

  /* ── CONVENIENCE ──────────────────────────────────────── */
  const answered=Object.keys(answers).length,total=questions.length,q=questions[current];
  const timerPct=(timeLeft/DURATION_S)*100,timerClr=timeLeft<300?"#ef4444":timeLeft<1200?"#f59e0b":"#22c55e";
  const filteredScores=allScores.filter(s=>!search||s.name.toLowerCase().includes(search.toLowerCase())||s.sid.toLowerCase().includes(search.toLowerCase()));

  /* ════════════════════════════════════════════════════════
     LOOKUP RESULT VIEW
  ════════════════════════════════════════════════════════ */
  if(screen==="lookup"&&lookResult){
    return <ResultCard result={lookResult} onBack={()=>{setScreen("login");setLookRes(null);setLookSid("");setLookErr("");}}/>;
  }

  /* ════════════════════════════════════════════════════════
     LOGIN
  ════════════════════════════════════════════════════════ */
  if(screen==="login")return(
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${NAV},#0e1c3a)`,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",fontFamily:FF,userSelect:"none"}}>
      <div style={{...card,padding:"38px",width:"100%",maxWidth:"430px"}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:"22px"}}>
          <div style={{width:"60px",height:"60px",background:`linear-gradient(135deg,${NAV},#2d4f8a)`,borderRadius:"14px",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:"28px",marginBottom:"10px",boxShadow:"0 6px 20px rgba(26,46,90,0.35)"}}>📝</div>
          <h1 style={{margin:"0 0 3px",fontSize:"18px",fontWeight:"800",color:NAV}}>Further Mathematics CBT</h1>
          <p style={{margin:"0 0 2px",fontSize:"12px",color:"#555",fontWeight:"600"}}>SS 2A — Computer Based Test</p>
          <p style={{margin:0,fontSize:"11px",color:"#999"}}>20 Questions • {Math.round(DURATION_S/60)} Minutes • 6 Topics</p>

        {/* Tabs */}
        <div style={{display:"flex",borderRadius:"10px",background:"#f1f5f9",padding:"4px",marginBottom:"20px"}}>
          {[["exam","🚀 Enter Exam"],["lookup","🔍 Check My Result"]].map(([t,label])=>(
            <button key={t} onClick={()=>{setLoginTab(t);setErr("");setLookErr("");setLookRes(null);}}
              style={{flex:1,padding:"9px 6px",border:"none",borderRadius:"8px",fontSize:"12px",fontWeight:"700",cursor:"pointer",transition:"all 0.15s",
                background:loginTab===t?"#fff":"transparent",color:loginTab===t?NAV:"#888",

        </>}

        {/* ── TAB: Check My Result ─────────────────────────── */}
        {loginTab==="lookup"&&<>
          <div style={{background:"#fffaed",border:`1.5px solid ${GOLD}`,borderRadius:"10px",padding:"13px 16px",marginBottom:"18px"}}>
            <p style={{margin:0,fontSize:"12px",color:"#92400e",lineHeight:"1.6"}}>
              🔍 Enter your Student ID below to view your saved exam result from any device, at any time.
            </p>
          </div>
          <label style={{display:"block",fontSize:"11px",fontWeight:"700",color:NAV,marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Student ID</label>
          <input value={lookSid} onChange={e=>setLookSid(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,""))} placeholder="Enter your 6-character ID"
            style={{...bi,marginBottom:"16px",textTransform:"uppercase",letterSpacing:"1px",fontWeight:"700",fontSize:"16px"}}
            onFocus={e=>e.target.style.borderColor=GOLD} onBlur={e=>e.target.style.borderColor="#e2e8f0"}
            onKeyDown={e=>e.key==="Enter"&&handleLookup()}/>
          {lookErr&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:"8px",padding:"10px 14px",fontSize:"12.5px",color:"#dc2626",marginBottom:"14px",lineHeight:"1.55"}}>{lookErr}</div>}
          <button onClick={handleLookup} disabled={lookLoading}
            style={{width:"100%",padding:"14px",background:`linear-gradient(135deg,${GOLD},#c98010)`,color:NAV,border:"none",borderRadius:"10px",fontSize:"15px",fontWeight:"700",cursor:lookLoading?"not-allowed":"pointer",opacity:lookLoading?0.7:1}}>
            {lookLoading?"⏳ Searching…":"🔍 View My Result"}
          </button>
          {lookResult&&<button onClick={()=>{setScreen("lookup");}}
            style={{width:"100%",marginTop:"10px",padding:"12px",background:NAV,color:"#fff",border:"none",borderRadius:"10px",fontSize:"14px",fontWeight:"700",cursor:"pointer"}}>
            📊 Show Full Result
          </button>}
          <p style={{textAlign:"center",fontSize:"10.5px",color:"#aaa",marginTop:"14px",lineHeight:"1.6"}}>
            This only shows your result — it does not restart or affect your exam record.
          </p>
        </>}
      </div>
    </div>
  );

  /* ════════════════════════════════════════════════════════
     INSTRUCTIONS
  ════════════════════════════════════════════════════════ */
  if(screen==="instructions")return(
    <div style={{minHeight:"100vh",background:BG,fontFamily:FF,padding:"16px",userSelect:"none"}}>
      <div style={{maxWidth:"640px",margin:"0 auto"}}>
        <div style={{background:`linear-gradient(135deg,${NAV},#2d4f8a)`,borderRadius:"14px",padding:"22px",color:"#fff",marginBottom:"14px",textAlign:"center"}}>
          <p style={{margin:"0 0 3px",fontSize:"11px",opacity:0.65}}>Welcome to the exam,</p>
          <h2 style={{margin:"0 0 3px",fontSize:"22px",fontWeight:"800"}}>{student.name}</h2>

        </div>

          {[["📋","20","Questions"],["⏱",Math.round(DURATION_S/60),"Minutes"],["📚","6","Topics"]].map(([ic,v,l])=>(
            <div key={l} style={{...card,padding:"14px",textAlign:"center"}}><div style={{fontSize:"22px"}}>{ic}</div><div style={{fontSize:"21px",fontWeight:"800",color:NAV}}>{v}</div><div style={{fontSize:"10px",color:"#888"}}>{l}</div></div>

        <div style={{...card,padding:"20px",marginBottom:"14px"}}>

          {[["✅","Each correct answer = 1 mark. Maximum: 20 marks."],["✅","Navigate freely between questions using the palette."],["✅","You may change any answer before final submission."],["🔒","Your ID is now locked — no other device can use it."],["⛔","Do NOT switch browser tabs — cheat violation."],["⛔","Do NOT minimise or switch windows — violation."],["⛔","Right-click, copy and paste are disabled."],["⚠️",`Each violation deducts ${PENALTY_PT} mark.`],["🚫",`${MAX_VIOL} violations = immediate auto-submission.`],["⏰","Exam auto-submits when the timer reaches zero."],["💾","Score saved to Firebase instantly — check it later via 'Check My Result'."]].map(([ic,tx],i)=>(
            <div key={i} style={{display:"flex",gap:"9px",padding:"7px 0",borderBottom:i<10?"1px solid #f1f5f9":"none",alignItems:"flex-start"}}>
              <span style={{fontSize:"12px",minWidth:"16px",lineHeight:"1.5"}}>{ic}</span>
              <span style={{fontSize:"12px",color:"#374151",lineHeight:"1.5"}}>{tx}</span>
            </div>
          ))}
        </div>
        <div style={{background:"#fffaed",border:`1.5px solid ${GOLD}`,borderRadius:"12px",padding:"16px",marginBottom:"18px"}}>
          <p style={{margin:"0 0 9px",fontSize:"11px",fontWeight:"700",color:NAV}}>📚 Topics & Distribution</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>

          </div>
        </div>
        <button onClick={()=>setScreen("exam")} style={{width:"100%",padding:"15px",background:`linear-gradient(135deg,${GOLD},#c98010)`,color:NAV,border:"none",borderRadius:"12px",fontSize:"16px",fontWeight:"800",cursor:"pointer",boxShadow:"0 4px 16px rgba(232,160,32,0.4)"}}>
          🎯 START EXAM — TIMER BEGINS NOW
        </button>
        <p style={{textAlign:"center",fontSize:"10.5px",color:"#aaa",marginTop:"10px"}}>Questions are randomly selected and shuffled uniquely for each student.</p>
      </div>
    </div>
  );

  /* ════════════════════════════════════════════════════════
     EXAM
  ════════════════════════════════════════════════════════ */
  if(screen==="exam"&&q)return(
    <div style={{minHeight:"100vh",background:BG,fontFamily:FF,userSelect:"none",WebkitUserSelect:"none"}}>
      {violMsg&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:"20px"}}>
        <div style={{background:"#fff",borderRadius:"16px",padding:"30px",maxWidth:"380px",textAlign:"center",border:"4px solid #ef4444",boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
          <div style={{fontSize:"46px",marginBottom:"10px"}}>🚨</div>
          <h2 style={{margin:"0 0 8px",color:"#ef4444",fontSize:"17px",fontWeight:"800"}}>ANTI-CHEAT VIOLATION</h2>
          <p style={{margin:"0 0 20px",fontSize:"13px",color:"#374151",lineHeight:"1.65"}}>{violMsg}</p>
          <button onClick={()=>setViolMsg("")} style={{padding:"10px 28px",background:"#ef4444",color:"#fff",border:"none",borderRadius:"8px",fontSize:"13px",fontWeight:"700",cursor:"pointer"}}>Acknowledged — Continue</button>
        </div>
      </div>}
      {confirmSub&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.62)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:"20px"}}>
        <div style={{background:"#fff",borderRadius:"16px",padding:"30px",maxWidth:"360px",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
          <div style={{fontSize:"42px",marginBottom:"8px"}}>🏁</div>
          <h2 style={{margin:"0 0 8px",color:NAV,fontSize:"16px",fontWeight:"800"}}>Submit Your Exam?</h2>
          <p style={{margin:"0 0 6px",fontSize:"13px",color:"#374151"}}>Answered: <strong style={{color:answered===total?"#16a34a":"#dc2626"}}>{answered}</strong> of <strong>{total}</strong></p>
          {answered<total&&<p style={{margin:"0 0 16px",fontSize:"12px",color:"#dc2626"}}>⚠️ {total-answered} unanswered will score zero.</p>}
          {answered===total&&<p style={{margin:"0 0 16px",fontSize:"12px",color:"#16a34a"}}>All answered — ready to submit!</p>}
          <div style={{display:"flex",gap:"10px"}}>
            <button onClick={()=>setCSub(false)} style={{flex:1,padding:"10px",background:"#f1f5f9",border:"none",borderRadius:"8px",fontSize:"13px",fontWeight:"600",cursor:"pointer"}}>Cancel</button>
            <button onClick={()=>submit(false)} style={{flex:2,padding:"10px",background:`linear-gradient(135deg,${GOLD},#c98010)`,color:NAV,border:"none",borderRadius:"8px",fontSize:"13px",fontWeight:"700",cursor:"pointer"}}>Yes, Submit Now</button>
          </div>
        </div>
      </div>}
      <div style={{background:`linear-gradient(135deg,${NAV},#2d4f8a)`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"10px",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,0.25)"}}>
        <div style={{color:"#fff",minWidth:0,flex:"1 1 0"}}><div style={{fontWeight:"700",fontSize:"12px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{student.name}</div><div style={{fontSize:"10px",opacity:0.6}}>{student.sid}</div></div>
        <div style={{textAlign:"center",flex:"0 0 auto"}}><div style={{fontSize:"24px",fontWeight:"900",color:timerClr,letterSpacing:"2px",textShadow:timeLeft<300?"0 0 10px rgba(239,68,68,0.5)":"none"}}>{fmt(timeLeft)}</div><div style={{fontSize:"8.5px",color:"rgba(255,255,255,0.45)"}}>REMAINING</div></div>
        <div style={{color:"#fff",textAlign:"right",flex:"1 1 0"}}><div style={{fontSize:"11px",fontWeight:"700"}}>{answered}/{total} answered</div>{viol>0&&<div style={{fontSize:"10px",color:"#fca5a5"}}>⚠️ {viol} violation{viol>1?"s":""}</div>}</div>
      </div>
      <div style={{height:"4px",background:"rgba(0,0,0,0.08)"}}><div style={{height:"100%",width:`${timerPct}%`,background:timerClr,transition:"width 1s linear"}}/></div>
      <div style={{maxWidth:"800px",margin:"0 auto",padding:"14px"}}>
        <div style={{...card,padding:"13px",marginBottom:"12px"}}>
          <p style={{margin:"0 0 8px",fontSize:"9.5px",fontWeight:"700",color:"#888",textTransform:"uppercase",letterSpacing:"0.5px"}}>Question Navigator — tap to jump</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
            {questions.map((qq,i)=><button key={qq.id} onClick={()=>setCurrent(i)} style={{width:"28px",height:"28px",borderRadius:"6px",border:"none",cursor:"pointer",fontSize:"10.5px",fontWeight:"700",background:i===current?NAV:answers[qq.id]?"#22c55e":"#f1f5f9",color:(i===current||answers[qq.id])?"#fff":"#374151",outline:i===current?`2px solid ${GOLD}`:"none",outlineOffset:"2px"}}>{i+1}</button>)}
          </div>
          <div style={{display:"flex",gap:"14px",marginTop:"8px"}}>
            {[["#22c55e","Answered"],["#f1f5f9","Not yet"],[NAV,"Current"]].map(([c,l])=><div key={l} style={{display:"flex",alignItems:"center",gap:"4px"}}><div style={{width:"9px",height:"9px",borderRadius:"2px",background:c}}/><span style={{fontSize:"9.5px",color:"#888"}}>{l}</span></div>)}
          </div>
        </div>
        <div style={{...card,padding:"22px",marginBottom:"12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"13px"}}>
            <span style={{...badge(NAV,GOLD)}}>{q.topic}</span>
            <span style={{fontSize:"11px",color:"#aaa",fontWeight:"600"}}>Q{current+1} of {total}</span>
          </div>
          <p style={{margin:"0 0 20px",fontSize:"15px",color:NAV,fontWeight:"600",lineHeight:"1.7"}}>{q.q}</p>
          <div style={{display:"flex",flexDirection:"column",gap:"9px"}}>
            {q.sOpts.map((opt,oi)=>{const letter=["A","B","C","D"][oi],sel=answers[q.id]===opt;return(
              <div key={oi} onClick={()=>{const na={...aRef.current,[q.id]:opt};setAnswers(na);aRef.current=na;}} style={{display:"flex",alignItems:"center",gap:"12px",padding:"11px 15px",borderRadius:"10px",border:`2px solid ${sel?NAV:"#e8edf5"}`,background:sel?"#eef1f8":"#fff",cursor:"pointer",transition:"all 0.12s",boxShadow:sel?"0 2px 8px rgba(26,46,90,0.12)":"none"}}>
                <div style={{width:"28px",height:"28px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"800",fontSize:"11.5px",flexShrink:0,background:sel?NAV:"#f1f5f9",color:sel?GOLD:"#555"}}>{letter}</div>
                <span style={{fontSize:"13.5px",color:sel?NAV:"#374151",fontWeight:sel?"600":"400",lineHeight:"1.45",flex:1}}>{opt}</span>
                {sel&&<span style={{color:"#16a34a",fontSize:"16px",fontWeight:"700"}}>✓</span>}
              </div>);})}
          </div>
        </div>
        <div style={{display:"flex",gap:"9px",marginBottom:"9px"}}>
          <button onClick={()=>setCurrent(c=>Math.max(0,c-1))} disabled={current===0} style={{flex:1,padding:"11px",background:"#fff",border:"2px solid #e2e8f0",borderRadius:"9px",fontSize:"13px",fontWeight:"600",color:"#374151",cursor:current===0?"not-allowed":"pointer",opacity:current===0?0.4:1}}>← Prev</button>
          {current<total-1?<button onClick={()=>setCurrent(c=>c+1)} style={{flex:2,padding:"11px",background:NAV,border:"none",borderRadius:"9px",fontSize:"13px",fontWeight:"600",color:"#fff",cursor:"pointer"}}>Next →</button>:<button onClick={()=>setCSub(true)} style={{flex:2,padding:"11px",background:`linear-gradient(135deg,${GOLD},#c98010)`,border:"none",borderRadius:"9px",fontSize:"13px",fontWeight:"700",color:NAV,cursor:"pointer"}}>🏁 Submit Exam</button>}
        </div>
        {current<total-1&&<button onClick={()=>setCSub(true)} style={{width:"100%",padding:"11px",background:`linear-gradient(135deg,${GOLD},#c98010)`,border:"none",borderRadius:"9px",fontSize:"13px",fontWeight:"700",color:NAV,cursor:"pointer"}}>🏁 Submit Exam ({answered}/{total} answered)</button>}
      </div>
    </div>
  );

  /* ════════════════════════════════════════════════════════
     RESULT (after submission)
  ════════════════════════════════════════════════════════ */
  if(screen==="result"&&result){
    return <ResultCard result={result}/>;
  }

  /* ════════════════════════════════════════════════════════
     ADMIN DASHBOARD
  ════════════════════════════════════════════════════════ */
  if(screen==="admin"){
    const avg=allScores.length?(allScores.reduce((a,s)=>a+s.finalScore,0)/allScores.length).toFixed(1):"—";
    const passes=allScores.filter(s=>["A","B","C"].includes(s.grade)).length;
    const sorted=[...filteredScores].sort((a,b)=>b.finalScore-a.finalScore);
    const gc2=g=>allScores.filter(s=>s.grade===g).length;
    const totalReg=Object.keys(mergedReg).length;
    const notYet=Object.keys(mergedReg).filter(id=>!allScores.find(s=>s.sid===id)).length;
    return(
      <div style={{minHeight:"100vh",background:BG,fontFamily:FF,padding:"18px",userSelect:"none"}}>
        <div style={{maxWidth:"1060px",margin:"0 auto"}}>

          {/* Remove confirm modal */}
          {confirmRemove&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:"20px"}}>
            <div style={{background:"#fff",borderRadius:"14px",padding:"28px",maxWidth:"380px",width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",textAlign:"center"}}>
              <div style={{fontSize:"38px",marginBottom:"10px"}}>🗑️</div>
              <h3 style={{margin:"0 0 8px",fontSize:"15px",fontWeight:"800",color:NAV}}>Remove Student?</h3>
              <p style={{margin:"0 0 6px",fontSize:"13px",color:"#374151"}}><strong>{confirmRemove.name}</strong> ({confirmRemove.sid})</p>
              <p style={{margin:"0 0 18px",fontSize:"12px",color:"#888"}}>They will no longer be able to log in. Their exam score (if any) is <b>not</b> deleted.</p>
              <div style={{display:"flex",gap:"10px"}}>
                <button onClick={()=>setConfirmRemove(null)} style={{flex:1,padding:"10px",background:"#f1f5f9",border:"none",borderRadius:"8px",fontSize:"13px",fontWeight:"600",cursor:"pointer"}}>Cancel</button>
                <button onClick={confirmRemoveStudent} style={{flex:2,padding:"10px",background:"#dc2626",color:"#fff",border:"none",borderRadius:"8px",fontSize:"13px",fontWeight:"700",cursor:"pointer"}}>Yes, Remove</button>
              </div>
            </div>
          </div>}

          {/* Header */}
          <div style={{background:`linear-gradient(135deg,${NAV},#2d4f8a)`,borderRadius:"13px",padding:"18px 22px",marginBottom:"16px",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 4px 16px rgba(26,46,90,0.25)",flexWrap:"wrap",gap:"12px"}}>
            <div>
              <h1 style={{margin:"0 0 3px",fontSize:"17px",fontWeight:"800",color:"#fff"}}>🔐 Teacher Admin Dashboard</h1>
              <p style={{margin:0,fontSize:"11px",color:"rgba(255,255,255,0.55)"}}>SS 2A Further Maths CBT — Firebase Live Score Portal</p>
            </div>
            <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
              <button onClick={()=>exportCSV(allScores)} style={{padding:"7px 14px",background:GOLD,color:NAV,border:"none",borderRadius:"7px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>⬇️ Export CSV</button>
              <button onClick={async()=>{setLoading(true);const[sc,dr]=await Promise.all([getAllScores(),getDynRegistry()]);setAll(sc);setDynReg(dr);setLoading(false);setGMsg("✅ Refreshed.");}} style={{padding:"7px 14px",background:"rgba(255,255,255,0.12)",color:"#fff",border:"1px solid rgba(255,255,255,0.2)",borderRadius:"7px",fontSize:"12px",cursor:"pointer"}}>🔄 Refresh</button>
              <button onClick={()=>{setScreen("login");setLAdmin("");setLSid("");setErr("");setGMsg("");setRegMsg({txt:"",ok:true});}} style={{padding:"7px 14px",background:"rgba(255,255,255,0.1)",color:"#fff",border:"1px solid rgba(255,255,255,0.2)",borderRadius:"7px",fontSize:"12px",cursor:"pointer"}}>← Log Out</button>
            </div>
          </div>

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"10px",marginBottom:"14px"}}>
            {[["📋",totalReg,"Registered"],["👥",allScores.length,"Sat Exam"],["⏳",notYet,"Pending"],["✅",passes,"Passed (C+)"],["📊",avg,"Avg Score"]].map(([ic,v,l])=>(
              <div key={l} style={{...card,padding:"13px",textAlign:"center"}}><div style={{fontSize:"18px"}}>{ic}</div><div style={{fontSize:"20px",fontWeight:"800",color:NAV}}>{v}</div><div style={{fontSize:"10px",color:"#888"}}>{l}</div></div>
            ))}
          </div>

          {/* Grade distribution */}
          {allScores.length>0&&<div style={{...card,padding:"16px",marginBottom:"14px"}}>
            <p style={{margin:"0 0 10px",fontSize:"12px",fontWeight:"700",color:NAV}}>📈 Grade Distribution</p>
            <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
              {["A","B","C","D","F"].map(g=>{const n=gc2(g),pct=allScores.length?Math.round(n/allScores.length*100):0;return(
                <div key={g} style={{flex:"1 1 60px",background:"#f8fafc",borderRadius:"9px",padding:"10px",textAlign:"center",borderTop:`3px solid ${gc(g)}`}}>
                  <div style={{fontSize:"16px",fontWeight:"800",color:gc(g)}}>{n}</div>
                  <div style={{fontSize:"9.5px",color:"#888"}}>Grade {g} ({pct}%)</div>
                </div>
              );})}
            </div>
          </div>}

          {/* Manage Registry */}
          <div style={{...card,padding:"18px",marginBottom:"14px",border:`2px solid ${GOLD}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showReg?"14px":"0"}}>
              <h3 style={{margin:0,fontSize:"13px",fontWeight:"700",color:NAV}}>👥 Manage Student Registry ({totalReg} students)</h3>
              <button onClick={()=>setShowReg(r=>!r)} style={{padding:"6px 14px",background:showReg?"#f1f5f9":NAV,color:showReg?NAV:"#fff",border:"none",borderRadius:"7px",fontSize:"12px",fontWeight:"600",cursor:"pointer"}}>
                {showReg?"▲ Hide":"▼ Open Registry"}
              </button>
            </div>
            {showReg&&<>
              <div style={{background:"#f8fafc",borderRadius:"10px",padding:"14px",marginBottom:"14px",border:"1px solid #e2e8f0"}}>
                <p style={{margin:"0 0 10px",fontSize:"11px",fontWeight:"700",color:NAV,textTransform:"uppercase",letterSpacing:"0.4px"}}>➕ Add New Student</p>
                <div style={{display:"flex",gap:"9px",flexWrap:"wrap",alignItems:"flex-end"}}>
                  <div style={{flex:"2 1 180px"}}>
                    <label style={{display:"block",fontSize:"10px",fontWeight:"700",color:"#555",marginBottom:"4px"}}>FULL NAME *</label>
                    <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Okafor Chukwuemeka" style={{...bi,fontSize:"13px"}} onFocus={e=>e.target.style.borderColor=GOLD} onBlur={e=>e.target.style.borderColor="#e2e8f0"} onKeyDown={e=>e.key==="Enter"&&handleAddStudent()}/>
                  </div>
                  <div style={{flex:"1 1 140px"}}>
                    <label style={{display:"block",fontSize:"10px",fontWeight:"700",color:"#555",marginBottom:"4px"}}>ID <span style={{fontWeight:"400",color:"#aaa"}}>(blank = auto)</span></label>
                    <input value={newId} onChange={e=>setNewId(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,6))} placeholder="Auto-generate" style={{...bi,fontSize:"13px",textTransform:"uppercase",letterSpacing:"1px",fontWeight:"700"}} onFocus={e=>e.target.style.borderColor=GOLD} onBlur={e=>e.target.style.borderColor="#e2e8f0"} onKeyDown={e=>e.key==="Enter"&&handleAddStudent()}/>
                  </div>
                  <button onClick={handleAddStudent} style={{padding:"10px 18px",background:`linear-gradient(135deg,${GOLD},#c98010)`,color:NAV,border:"none",borderRadius:"8px",fontSize:"13px",fontWeight:"700",cursor:"pointer",whiteSpace:"nowrap",height:"42px",marginTop:"18px"}}>➕ Add</button>
                </div>
                {regMsg.txt&&<p style={{margin:"10px 0 0",fontSize:"12px",fontWeight:"600",color:regMsg.ok?"#16a34a":"#dc2626"}}>{regMsg.txt}</p>}
                <p style={{margin:"8px 0 0",fontSize:"10.5px",color:"#aaa"}}>New students are saved to Firebase and can log in immediately.</p>
              </div>
              <p style={{margin:"0 0 8px",fontSize:"11px",fontWeight:"700",color:NAV,textTransform:"uppercase",letterSpacing:"0.4px"}}>📋 Full Registry</p>
              <div style={{overflowX:"auto",borderRadius:"8px",border:"1px solid #e2e8f0"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}>
                  <thead><tr style={{background:NAV,color:"#fff"}}>{["#","Name","ID","Type","Status","Action"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:"10.5px",fontWeight:"700",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {Object.entries(mergedReg).map(([id,name],i)=>{
                      const isDyn=!!dynReg[id],hasSat=allScores.find(s=>s.sid===id);
                      return(<tr key={id} style={{background:i%2===0?"#fff":"#f8fafc",borderBottom:"1px solid #f1f5f9"}}>
                        <td style={{padding:"8px 12px",color:"#aaa",fontWeight:"600"}}>{i+1}</td>
                        <td style={{padding:"8px 12px",fontWeight:"700",color:NAV}}>{name}</td>
                        <td style={{padding:"8px 12px",fontFamily:"monospace",letterSpacing:"1px",fontWeight:"700",color:"#2563eb"}}>{id}</td>
                        <td style={{padding:"8px 12px"}}><span style={{background:isDyn?"#fffaed":"#f0f7ff",color:isDyn?"#92400e":"#1e40af",padding:"2px 8px",borderRadius:"12px",fontSize:"10px",fontWeight:"700"}}>{isDyn?"🆕 Dynamic":"📌 Base"}</span></td>
                        <td style={{padding:"8px 12px"}}>{hasSat?<span style={{background:"#f0fdf4",color:"#16a34a",padding:"2px 8px",borderRadius:"12px",fontSize:"10px",fontWeight:"700"}}>✅ Completed</span>:<span style={{background:"#f1f5f9",color:"#888",padding:"2px 8px",borderRadius:"12px",fontSize:"10px",fontWeight:"600"}}>⏳ Pending</span>}</td>
                        <td style={{padding:"8px 12px"}}>{isDyn?<button onClick={()=>handleRemoveStudent(id)} style={{padding:"4px 10px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:"6px",fontSize:"10.5px",fontWeight:"600",cursor:"pointer"}}>🗑 Remove</button>:<span style={{fontSize:"10.5px",color:"#bbb"}}>Edit HTML</span>}</td>
                      </tr>);
                    })}
                  </tbody>
                </table>
              </div>
              <p style={{margin:"8px 0 0",fontSize:"10.5px",color:"#aaa"}}>📌 <b>Base</b> = in HTML file. 🆕 <b>Dynamic</b> = added here, stored in Firebase.</p>
            </>}
          </div>

          {/* Resit + Session Reset */}
          <div style={{...card,padding:"18px",marginBottom:"14px"}}>
            <h3 style={{margin:"0 0 12px",fontSize:"13px",fontWeight:"700",color:NAV}}>🔁 Grant Resit / Reset Session</h3>
            <div style={{display:"flex",gap:"9px",flexWrap:"wrap",alignItems:"flex-end"}}>
              <div style={{flex:"1 1 200px"}}>
                <label style={{display:"block",fontSize:"10px",fontWeight:"700",color:NAV,marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.4px"}}>Student ID</label>
                <input value={gSid} onChange={e=>setGSid(e.target.value.toUpperCase())} placeholder="6-char Student ID" style={{...bi,textTransform:"uppercase"}} onFocus={e=>e.target.style.borderColor=GOLD} onBlur={e=>e.target.style.borderColor="#e2e8f0"} onKeyDown={e=>e.key==="Enter"&&handleGrant()}/>
                {mergedReg[gSid]&&<p style={{margin:"4px 0 0",fontSize:"11px",color:"#16a34a",fontWeight:"600"}}>👤 {mergedReg[gSid]}</p>}
              </div>
              <button onClick={handleGrant} style={{padding:"10px 16px",background:NAV,color:"#fff",border:"none",borderRadius:"8px",fontSize:"12.5px",fontWeight:"600",cursor:"pointer",whiteSpace:"nowrap",height:"40px",marginTop:"20px"}}>✅ Grant Resit</button>
              <button onClick={()=>gSid&&handleResetSession(gSid)} style={{padding:"10px 16px",background:"#f1f5f9",color:NAV,border:"1.5px solid #e2e8f0",borderRadius:"8px",fontSize:"12.5px",fontWeight:"600",cursor:"pointer",whiteSpace:"nowrap",height:"40px",marginTop:"20px"}}>🔄 Reset Session</button>
            </div>
            {gMsg&&<p style={{margin:"10px 0 0",fontSize:"12px",color:"#16a34a",fontWeight:"600"}}>{gMsg}</p>}
            <p style={{margin:"8px 0 0",fontSize:"10.5px",color:"#aaa"}}><b>Grant Resit</b>: clears score + unlocks ID. <b>Reset Session</b>: frees stuck session lock only.</p>
          </div>

          {/* Results table */}
          <div style={{...card,overflow:"hidden"}}>
            <div style={{padding:"13px 18px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center",gap:"12px",flexWrap:"wrap"}}>
              <h3 style={{margin:0,fontSize:"13px",fontWeight:"700",color:NAV}}>📋 Results — {allScores.length}/{totalReg} students</h3>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search name or ID…" style={{...bi,width:"200px",padding:"7px 12px",fontSize:"12px"}} onFocus={e=>e.target.style.borderColor=GOLD} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>
            </div>
            {loading?(<div style={{padding:"40px",textAlign:"center",color:"#999"}}>⏳ Loading from Firebase…</div>):allScores.length===0?(<div style={{padding:"40px",textAlign:"center",color:"#bbb"}}><div style={{fontSize:"36px",marginBottom:"8px"}}>📭</div><p style={{margin:0,fontSize:"13px"}}>No students have submitted the exam yet.</p></div>):(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr style={{background:NAV,color:"#fff"}}>{["#","Name","ID","Score","Pct","Grade","Violations","Penalty","Time","Date"].map(h=><th key={h} style={{padding:"9px 11px",textAlign:"left",fontSize:"10.5px",fontWeight:"700",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                  <tbody>{sorted.map((s,i)=>(
                    <tr key={s.sid} style={{background:i%2===0?"#fff":"#f8fafc",borderBottom:"1px solid #f1f5f9"}}>
                      <td style={{padding:"9px 11px",fontSize:"11px",color:"#aaa",fontWeight:"600"}}>{i+1}</td>
                      <td style={{padding:"9px 11px",fontSize:"12.5px",fontWeight:"700",color:NAV}}>{s.name}</td>
                      <td style={{padding:"9px 11px",fontSize:"11px",color:"#666",fontFamily:"monospace"}}>{s.sid}</td>
                      <td style={{padding:"9px 11px",fontSize:"13px",fontWeight:"800",color:NAV}}>{s.finalScore?.toFixed(1)}/{s.total}</td>
                      <td style={{padding:"9px 11px",fontSize:"12px",fontWeight:"700",color:gc(s.grade)}}>{s.pct}%</td>
                      <td style={{padding:"9px 11px"}}><span style={{background:gc(s.grade),color:"#fff",padding:"2px 9px",borderRadius:"12px",fontSize:"11px",fontWeight:"800"}}>{s.grade}</span></td>
                      <td style={{padding:"9px 11px",fontSize:"12px",fontWeight:"700",color:s.violations>0?"#ef4444":"#16a34a",textAlign:"center"}}>{s.violations}</td>
                      <td style={{padding:"9px 11px",fontSize:"11.5px",color:s.penalty>0?"#ef4444":"#aaa",fontWeight:s.penalty>0?"700":"400"}}>{s.penalty>0?`\u2212${s.penalty}`:"—"}</td>
                      <td style={{padding:"9px 11px",fontSize:"11px",color:"#888",whiteSpace:"nowrap"}}>{Math.floor((s.timeTaken||0)/60)}m {(s.timeTaken||0)%60}s</td>
                      <td style={{padding:"9px 11px",fontSize:"10.5px",color:"#bbb",whiteSpace:"nowrap"}}>{s.date}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            )}
          </div>

          {/* Pending */}
          {notYet>0&&<div style={{...card,padding:"16px",marginTop:"14px"}}>
            <h3 style={{margin:"0 0 12px",fontSize:"13px",fontWeight:"700",color:NAV}}>⏳ Students Yet to Sit ({notYet})</h3>
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
              {Object.entries(mergedReg).filter(([id])=>!allScores.find(s=>s.sid===id)).map(([id,name])=>(
                <span key={id} style={{background:"#f1f5f9",color:"#555",padding:"4px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:"600"}}>{id} — {name}</span>
              ))}
            </div>
          </div>}

          <p style={{textAlign:"center",fontSize:"10.5px",color:"#aaa",marginTop:"14px",lineHeight:"1.7"}}>
            All data stored in Firebase Realtime Database — live, cross-device, always accessible.<br/>
            Use Export CSV for a permanent offline spreadsheet copy.
          </p>
        </div>
      </div>
    );
  }
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
